
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viveka AI - Professional Transcription</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Gurmukhi:wght@400;700&family=Noto+Sans+Kannada:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&family=Noto+Sans+Oriya:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans Devanagari', 'Noto Sans Tamil', 'Noto Sans Telugu', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
          },
          colors: {
            violet: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
              950: '#2e1065',
            },
          },
          animation: {
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .glass-panel {
        @apply bg-white/70 backdrop-blur-xl border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)];
      }
      .custom-scrollbar::-webkit-scrollbar {
        @apply w-1.5;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        @apply bg-transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        @apply bg-slate-300 rounded-full hover:bg-violet-400 transition-colors;
      }
      .wave-bar {
        @apply origin-bottom;
        animation: wave-loading 1.2s ease-in-out infinite;
      }
      .indian-script {
        line-height: 1.6;
        @apply font-sans;
      }
    }

    @keyframes wave-loading {
      0%, 100% { transform: scaleY(0.4); opacity: 0.3; }
      50% { transform: scaleY(1.2); opacity: 1; }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "url": "https://esm.sh/url@^0.11.4",
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "jspdf": "https://esm.sh/jspdf@^4.1.0",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react/": "https://esm.sh/react@18.3.1/"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen selection:bg-violet-100 selection:text-violet-900">
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-violet-200/30 blur-[120px] rounded-full animate-float"></div>
    <div class="absolute top-[20%] -right-[5%] w-[30%] h-[30%] bg-fuchsia-200/20 blur-[100px] rounded-full animate-float" style="animation-delay: -2s"></div>
    <div class="absolute -bottom-[10%] left-[20%] w-[35%] h-[35%] bg-blue-200/20 blur-[110px] rounded-full animate-float" style="animation-delay: -4s"></div>
  </div>

  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
</body>
</html>
